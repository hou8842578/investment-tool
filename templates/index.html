<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资管理工具</title>
<style>
  :root {
    --bg: #0f1117; --card: #181a24; --card-hover: #1e2133; --border: #2a2d3e;
    --text: #e4e6f0; --text-dim: #8b8fa3; --accent: #6c5ce7; --accent-glow: rgba(108,92,231,0.25);
    --green: #00cec9; --green-dim: rgba(0,206,201,0.15); --red: #ff6b6b; --red-dim: rgba(255,107,107,0.15);
    --orange: #fdcb6e; --orange-dim: rgba(253,203,110,0.15); --blue: #74b9ff; --blue-dim: rgba(116,185,255,0.15);
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px; background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 80px; position: relative; z-index: 1; }

  /* 头部 */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .header-topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; width: 100%; }
  .header-left { min-width: 0; }
  .header-left h1 {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e4e6f0, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-left p { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .header-primary-actions, .header-more-wrap { display: flex; align-items: center; gap: 8px; }
  .header-quick-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-quick-btn {
    min-height: 34px;
    padding: 7px 12px;
    border-radius: 999px;
    white-space: nowrap;
    justify-content: center;
  }
  .header-more-wrap { position: relative; }
  .header-more-btn { min-width: 104px; justify-content: center; }
  .header-more-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 180px;
    padding: 8px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: #181a24;
    box-shadow: 0 14px 34px rgba(0,0,0,0.3);
    display: none;
    z-index: 40;
  }
  .header-more-menu.show { display: block; }
  .header-menu-item {
    width: 100%;
    justify-content: flex-start;
    padding: 10px 12px;
    border-radius: 10px;
  }
  .btn {
    padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: #5a4bd6; transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); } .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-green { background: var(--green); color: #0f1117; } .btn-green:hover { background: #00b5b1; }
  .btn-red { background: var(--red); color: #fff; } .btn-red:hover { background: #ee5a5a; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-icon {
    width: 30px; height: 30px; padding: 0; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--text-dim); color: var(--text); background: rgba(255,255,255,0.05); }
  .btn-icon.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .btn-prefix { font-size: 13px; opacity: 0.9; }

  /* 统计 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 16px; position: relative; overflow: hidden; transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .stat-card .icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 10px; }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; }
  .stat-card .value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .stat-card.purple .icon { background: var(--accent-glow); } .stat-card.purple .value { color: var(--accent); }
  .stat-card.green .icon { background: var(--green-dim); } .stat-card.green .value { color: var(--green); }
  .stat-card.orange .icon { background: var(--orange-dim); } .stat-card.orange .value { color: var(--orange); }
  .stat-card.blue .icon { background: var(--blue-dim); } .stat-card.blue .value { color: var(--blue); }

  /* 提醒条 */
  .alert-bar {
    background: var(--red-dim); border: 1px solid rgba(255,107,107,0.3); border-radius: var(--radius-sm);
    padding: 12px 16px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .alert-bar.warn { background: var(--orange-dim); border-color: rgba(253,203,110,0.3); }
  .alert-bar .alert-text { font-size: 13px; font-weight: 500; color: var(--red); }
  .alert-bar.warn .alert-text { color: var(--orange); }
  .alert-bar .alert-items { display: flex; gap: 8px; flex-wrap: wrap; }
  .alert-chip { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); color: var(--text); cursor: pointer; transition: background 0.15s; }
  .alert-chip:hover { background: rgba(255,255,255,0.15); }

  /* 标签 */
  .tabs { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 4px; margin-bottom: 18px; width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-dim); transition: all 0.2s; border: none; background: none; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.05); }

  /* 图表 */
  .chart-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 24px; margin-bottom: 24px; }
  .chart-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
  .chart-legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text-dim); }
  .chart-legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .chart-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-top: 4px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 280px; padding: 32px 8px 0; }
  .bar-group { flex: 1; min-width: 44px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 100%; max-width: 40px; border-radius: 6px 6px 2px 2px; transition: height 0.6s cubic-bezier(0.22,1,0.36,1); cursor: pointer; position: relative; min-height: 4px; }
  .bar:hover { opacity: 0.85; }
  .bar-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .bar-value { font-size: 11px; color: var(--text); font-weight: 600; white-space: nowrap; }
  .bar-tooltip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #2a2d3e; color: var(--text); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10;
  }
  .bar:hover .bar-tooltip { opacity: 1; }

  /* 横向条形图（备用） */
  .h-chart { display: none; }
  .h-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .h-label { font-size: 12px; color: var(--text-dim); width: 42px; text-align: right; flex-shrink: 0; }
  .h-track { flex: 1; height: 28px; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; position: relative; }
  .h-fill { height: 100%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); display: flex; align-items: center; padding-left: 10px; }
  .h-fill-text { font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }

  .bar-chart.desktop-like {
    min-width: 720px;
  }

  /* 年度汇总 */
  .year-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .year-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .year-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .year-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .year-card .year-title { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .year-card .year-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .year-card .year-row .yr-label { color: var(--text-dim); }
  .year-card .year-row .yr-val { font-weight: 600; }

  /* 青山分账 */
  .qingshan-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .qingshan-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .qs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .qs-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .qs-item .qs-val { font-size: 20px; font-weight: 700; color: var(--blue); }
  .qs-item .qs-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* 表格 */
  .table-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
  .table-header h3 { font-size: 15px; font-weight: 600; }
  .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); transition: all 0.2s; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn:not(.active):hover { border-color: var(--text-dim); color: var(--text); }
  .search-box { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; width: 130px; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--accent); } .search-box::placeholder { color: var(--text-dim); }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 1000px; }
  thead th { padding: 11px 10px; font-size: 12px; font-weight: 600; color: var(--text-dim); text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); } thead th .sort-icon { margin-left: 3px; font-size: 10px; }
  tbody tr { transition: background 0.15s; } tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 10px 10px; font-size: 13px; border-bottom: 1px solid rgba(42,45,62,0.5); white-space: nowrap; }
  th:nth-child(1), td:nth-child(1) { min-width: 92px; }
  th:nth-child(2), td:nth-child(2) { min-width: 118px; }
  .amount { font-weight: 600; font-variant-numeric: tabular-nums; }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .tag.returned { background: var(--green-dim); color: var(--green); } .tag.pending { background: var(--orange-dim); color: var(--orange); } .tag.overdue { background: var(--red-dim); color: var(--red); }
  .remark { color: var(--text-dim); font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
  .days-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .days-badge.near { background: var(--orange-dim); color: var(--orange); } .days-badge.far { background: var(--green-dim); color: var(--green); } .days-badge.overdue { background: var(--red-dim); color: var(--red); }
  .action-cell { display: flex; gap: 4px; }
  .actual-days { color: var(--blue); font-weight: 600; }

  /* 移动端卡片 */
  .mobile-cards { display: none; padding: 12px; }
  .m-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .m-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .m-card-date { font-size: 14px; font-weight: 600; } .m-card-amount { font-size: 16px; font-weight: 700; color: var(--accent); }
  .m-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
  .m-card-grid .m-label { color: var(--text-dim); } .m-card-grid .m-val { font-weight: 600; }
  .m-card-grid .m-val.highlight { color: var(--green); } .m-card-grid .m-val.warn { color: var(--orange); } .m-card-grid .m-val.danger { color: var(--red); }
  .m-card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .m-card-remark { font-size: 11px; color: var(--text-dim); max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .m-card-actions { display: flex; gap: 6px; }

  /* 分页 */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 14px; border-top: 1px solid var(--border); }
  .page-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .page-btn:not(.active):hover { border-color: var(--text-dim); color: var(--text); }
  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
  .admin-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .admin-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .admin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
  .admin-kpi { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .admin-kpi .label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .admin-kpi .value { font-size: 22px; font-weight: 700; color: var(--accent); }
  .admin-panel { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .admin-panel-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .admin-panel-head p { color: var(--text-dim); font-size: 12px; }
  .admin-rank-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
  .admin-rank-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .admin-rank-card h4 { font-size: 13px; font-weight: 600; padding: 14px 14px 10px; }
  .rank-list { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 8px; }
  .rank-item { display: flex; justify-content: space-between; gap: 10px; align-items: center; font-size: 12px; border: 1px solid rgba(42,45,62,0.5); border-radius: 8px; padding: 8px 10px; }
  .rank-item strong { font-size: 13px; color: var(--text); }
  .rank-meta { color: var(--text-dim); }
  .admin-table-wrap { overflow-x: auto; }
  .admin-table { width: 100%; border-collapse: collapse; min-width: 860px; }
  .admin-table th, .admin-table td { padding: 11px 12px; border-bottom: 1px solid rgba(42,45,62,0.5); font-size: 13px; text-align: left; white-space: nowrap; }
  .admin-table th { color: var(--text-dim); font-size: 12px; font-weight: 600; }
  .admin-tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; background: var(--blue-dim); color: var(--blue); }
  .admin-tag.active { background: var(--green-dim); color: var(--green); }
  .admin-tag.mid { background: var(--orange-dim); color: var(--orange); }
  .admin-tag.idle { background: var(--red-dim); color: var(--red); }
  .admin-latest { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .admin-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--text-dim); }

  /* 弹窗 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  .modal-head { padding: 18px 20px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .modal-head h3 { font-size: 16px; font-weight: 600; }
  .modal-close { width: 30px; height: 30px; border-radius: 6px; border: none; background: transparent; color: var(--text-dim); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .modal-body { padding: 18px 20px; } .modal-foot { padding: 14px 20px 18px; display: flex; justify-content: flex-end; gap: 10px; }

  /* 表单 */
  .form-row { margin-bottom: 14px; } .form-row:last-child { margin-bottom: 0; }
  .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-dim); }
  .form-label .hint { font-weight: 400; font-size: 11px; color: var(--text-dim); opacity: 0.7; margin-left: 6px; }
  .form-input { width: 100%; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-input:focus { border-color: var(--accent); } .form-input::placeholder { color: var(--text-dim); opacity: 0.6; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-calc { background: rgba(108,92,231,0.08); border: 1px dashed rgba(108,92,231,0.3); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 4px; font-size: 13px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
  .form-calc .calc-val { font-weight: 700; font-size: 16px; }
  .return-summary { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .return-summary .rs-label { font-size: 11px; color: var(--text-dim); } .return-summary .rs-val { font-size: 14px; font-weight: 600; }

  /* 登录遮罩 */
  .login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 28px; width: 340px; text-align: center; }
  .login-box h2 { font-size: 20px; margin-bottom: 6px; background: linear-gradient(135deg, #e4e6f0, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .login-box .form-input { margin-bottom: 12px; text-align: center; }
  .login-box .login-err { color: var(--red); font-size: 12px; margin-bottom: 10px; min-height: 18px; }
  .login-box .first-run-hint { color: var(--orange); font-size: 12px; margin-top: 10px; }
  .auth-switch { display: flex; gap: 8px; margin-bottom: 14px; }
  .auth-switch .btn { flex: 1; justify-content: center; }
  .login-box .auth-tip { color: var(--text-dim); font-size: 12px; margin-top: 12px; line-height: 1.5; }

  /* Toast */

<body>

<div class="toast-container" id="toastContainer"></div>

<!-- 登录遮罩 -->

<!-- 新增/编辑弹窗 -->
<div class="modal-overlay" id="investModal">
  <div class="modal">
    <div class="modal-head"><h3 id="investModalTitle">新增投资</h3><button class="modal-close" onclick="closeModal('investModal')">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-row"><label class="form-label">投资日期</label><input class="form-input" type="date" id="fDate"></div>
        <div class="form-row"><label class="form-label">投资金额（元）</label><input class="form-input" type="number" id="fAmount" placeholder="如 300000" oninput="calcInvest()"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">利息/万 <span class="hint">每万元收益</span></label><input class="form-input" type="number" id="fRate" placeholder="如 280" oninput="calcInvest()"></div>
        <div class="form-row"><label class="form-label">投资天数</label><input class="form-input" type="number" id="fDays" placeholder="如 35" oninput="calcInvest()"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">合作方名称</label><input class="form-input" type="text" id="fPartnerName" placeholder="如 青山"></div>
        <div class="form-row"><label class="form-label">合作出资（元）</label><input class="form-input" type="number" id="fPartnerAmount" placeholder="默认 0"></div>
      </div>
      <div class="form-row"><label class="form-label">备注</label><input class="form-input" type="text" id="fRemark" placeholder="可选"></div>
      <div class="form-calc"><span>计划总利息（自动计算）</span><span class="calc-val" id="calcInterest">¥0</span></div>
      <div class="form-calc" style="margin-top:6px"><span>计划回款日期（自动计算）</span><span class="calc-val" id="calcReturnDate" style="font-size:14px">-</span></div>
    </div>

</div>

<!-- 回款弹窗 -->

    <div class="modal-head"><h3 id="returnModalTitle">确认回款</h3><button class="modal-close" onclick="closeModal('returnModal')">&times;</button></div>
    <div class="modal-body">
      <input type="hidden" id="returnId">
      <div class="return-summary" id="returnSummary"></div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">实际回款日期</label><input class="form-input" type="date" id="fActualDate"></div>
        <div class="form-row"><label class="form-label">实际总利息（元）<span class="hint">如有调整</span></label><input class="form-input" type="number" id="fFinalInterest" placeholder="默认=计划总利息"></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label class="form-label">服务费（元）</label><input class="form-input" type="number" id="fToLaoTan" placeholder="0"></div>

      </div>
    </div>

</div>

  <div class="modal" style="max-width:380px">

    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('deleteModal')">取消</button><button class="btn btn-red" onclick="confirmDelete()">删除</button></div>

</div>

      <div class="form-row"><label class="form-label">原密码</label><input class="form-input" type="password" id="oldPwd"></div>
      <div class="form-row"><label class="form-label">新密码</label><input class="form-input" type="password" id="newPwd" placeholder="至少4位"></div>
      <div class="form-row"><label class="form-label">确认新密码</label><input class="form-input" type="password" id="newPwd2"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal('pwdModal')">取消</button><button class="btn btn-primary" onclick="doChangePwd()">确认修改</button></div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="header-topbar">
      <div class="header-left"><h1>投资管理工具</h1><p id="updateTime"></p></div>
      <div class="header-quick-actions">
        <button class="btn btn-outline header-quick-btn" onclick="openModal('pwdModal')" title="修改密码">修改密码</button>
        <button class="btn btn-outline header-quick-btn" onclick="doLogout()" title="退出登录">退出登录</button>

    </div>
    <div class="header-actions">

        <button class="btn btn-primary" onclick="openAddModal()">+ 新增投资</button>
      </div>
      <div class="header-more-wrap">
        <button class="btn btn-outline header-more-btn" id="moreMenuBtn" onclick="toggleMoreMenu(event)"><span class="btn-prefix">⋯</span><span>更多</span></button>
        <div class="header-more-menu" id="headerMoreMenu">
          <button class="btn btn-outline header-menu-item" id="adminEntryBtn" onclick="handleMoreAction('admin')" style="display:none"><span class="btn-prefix">⌘</span><span>管理员后台</span></button>
          <button class="btn btn-outline header-menu-item" onclick="handleMoreAction('excel')"><span class="btn-prefix">⇩</span><span>导出 Excel</span></button>
          <button class="btn btn-outline header-menu-item" onclick="handleMoreAction('json')"><span class="btn-prefix">{ }</span><span>导出 JSON</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 提醒条 -->
  <div id="alertArea"></div>

  <div class="stats" id="statsArea"></div>
  <div class="tabs">
    <button class="tab active" data-view="chart">月度利息</button>
    <button class="tab" data-view="days">投资周期</button>
    <button class="tab" data-view="rate">利率趋势</button>
    <button class="tab" data-view="year">年度汇总</button>
    <button class="tab" data-view="partner">合作分账</button>
    <button class="tab" data-view="table">投资明细</button>
    <button class="tab" data-view="admin" id="adminTab" style="display:none">管理员后台</button>
  </div>

  <div class="chart-section" id="chartSection"><h3>每月实际利息（按实际回款月份）</h3><div class="chart-legend"><span><span class="legend-dot" style="background:var(--accent)"></span>总利息</span><span><span class="legend-dot" style="background:var(--green)"></span>我的利息</span></div><div class="chart-wrapper"><div class="bar-chart desktop-like" id="barChart"></div><div class="h-chart" id="hChart"></div></div></div>
  <div class="chart-section" id="daysSection" style="display:none">
    <h3>每月平均实际投资天数</h3>
    <div class="chart-legend"><span><span class="legend-dot" style="background:var(--accent)"></span>计划天数</span><span><span class="legend-dot" style="background:var(--orange)"></span>实际天数</span></div>
    <div class="chart-wrapper"><div class="bar-chart desktop-like" id="daysBarChart"></div><div class="h-chart" id="daysHChart"></div></div>
  </div>

  <div id="yearSection" style="display:none"></div>
  <div id="partnerSection" style="display:none"></div>
  <div id="adminSection" style="display:none"></div>

    <div class="table-header">
      <h3>投资明细 (<span id="totalCount">0</span>条)</h3>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">全部</button>

<script>
const TODAY = '{{ today }}';
let records = [];
let isLoggedIn = false;
let currentUsername = '';
let isAdmin = false;
let authMode = 'login';
let dashboard = { alerts: { urgent: [], near: [] }, summary: null, monthlyInterest: [], daysTrend: [], rateTrend: [], yearly: [], partners: [] };
let tableRecords = [];
let tableMeta = { total: 0, page: 1, pageSize: 15, totalPages: 1 };
let adminData = { overview: null, users: [] };

// ===================== 认证 =====================
async function checkAuth() {
  const res = await fetch('/api/check-auth');
  const data = await res.json();
  isLoggedIn = data.logged_in;
  currentUsername = data.username || '';
  isAdmin = !!data.is_admin;
  if (!isLoggedIn) {
    document.getElementById('loginOverlay').style.display = 'flex';
    updateAdminVisibility();
    updateHeaderUser();
  } else {
    document.getElementById('loginOverlay').style.display = 'none';
    updateAdminVisibility();
    updateHeaderUser();
    await loadRecords();
  }
}

function switchAuthMode(mode) {
  authMode = mode;
  const isLogin = mode === 'login';
  document.getElementById('loginTabBtn').className = 'btn ' + (isLogin ? 'btn-primary' : 'btn-outline');
  document.getElementById('registerTabBtn').className = 'btn ' + (isLogin ? 'btn-outline' : 'btn-primary');
  document.getElementById('authSubtitle').textContent = isLogin ? '请输入账号密码登录' : '注册后将自动登录并创建独立数据空间';
  document.getElementById('authSubmitBtn').textContent = isLogin ? '登录' : '注册并进入';
  document.getElementById('authTip').textContent = isLogin ? '首次使用可先注册新账号；历史数据已迁移到 admin 账号。' : '账号长度 3-20 位，密码至少 4 位。';
  document.getElementById('loginErr').textContent = '';
}

function submitAuth() {
  if (authMode === 'register') return doRegister();
  return doLogin();
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!username || !pwd) { errEl.textContent = '请输入账号和密码'; return; }
  try {
    const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password: pwd}) });
    const data = await res.json();
    if (data.ok) {
      isLoggedIn = true;
      currentUsername = data.username || username;
      isAdmin = !!data.is_admin;
      document.getElementById('loginOverlay').style.display = 'none';
      updateAdminVisibility();
      updateHeaderUser();
      await loadRecords();
    } else {
      errEl.textContent = data.msg || '账号或密码错误';
    }
  } catch(e) { errEl.textContent = '网络错误'; }
}

async function doRegister() {
  const username = document.getElementById('loginUser').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!username || !pwd) { errEl.textContent = '请输入账号和密码'; return; }
  try {
    const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password: pwd}) });
    const data = await res.json();
    if (data.ok) {
      isLoggedIn = true;
      currentUsername = data.username || username;
      isAdmin = !!data.is_admin;
      document.getElementById('loginOverlay').style.display = 'none';
      updateAdminVisibility();
      updateHeaderUser();
      toast('注册成功');
      await loadRecords();
    } else {
      errEl.textContent = data.msg || '注册失败';
    }
  } catch(e) { errEl.textContent = '网络错误'; }
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  isLoggedIn = false;
  currentUsername = '';
  isAdmin = false;
  records = [];
  tableRecords = [];
  tableMeta = { total: 0, page: 1, pageSize: 15, totalPages: 1 };
  adminData = { overview: null, users: [] };
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginErr').textContent = '';
  switchAuthMode('login');

// ===================== API =====================
async function api(url, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (res.status === 401) { isLoggedIn = false; document.getElementById('loginOverlay').style.display = 'flex'; return {ok:false, msg:'请先登录'}; }
  return res.json();
}

async function loadRecords() {
  const [recordRes, dashboardRes] = await Promise.all([api('/api/records'), api('/api/dashboard')]);
  if (recordRes && recordRes.ok === false) return;
  if (dashboardRes && dashboardRes.ok === false) return;
  records = Array.isArray(recordRes) ? recordRes : [];
  dashboard = dashboardRes && dashboardRes.summary ? dashboardRes : { alerts: { urgent: [], near: [] }, summary: null, monthlyInterest: [], daysTrend: [], rateTrend: [], yearly: [], partners: [] };
  if (isAdmin) await loadAdminData();
  else adminData = { overview: null, users: [] };
  await loadTableData();
  refreshAll();
}

async function loadAdminData() {
  const [overviewRes, usersRes] = await Promise.all([api('/api/admin/overview'), api('/api/admin/users')]);
  if (overviewRes && overviewRes.ok === false) {
    if (overviewRes.msg) toast(overviewRes.msg, 'error');
    adminData = { overview: null, users: [] };
    return;
  }
  if (usersRes && usersRes.ok === false) {
    if (usersRes.msg) toast(usersRes.msg, 'error');
    adminData = { overview: overviewRes || null, users: [] };
    return;
  }
  adminData = {
    overview: overviewRes || null,
    users: Array.isArray(usersRes.items) ? usersRes.items : [],
  };
}

async function loadTableData() {
  const params = new URLSearchParams({
    filter: currentFilter,
    search: currentSearch,
    sortKey: currentSort.key,
    sortDir: currentSort.dir,
    page: String(currentPage),
    pageSize: String(pageSize),
  });
  const res = await api('/api/records?' + params.toString());
  if (res && res.ok === false) return;
  tableRecords = Array.isArray(res.items) ? res.items : [];
  tableMeta = {
    total: res.total || 0,
    page: res.page || 1,
    pageSize: res.pageSize || pageSize,
    totalPages: res.totalPages || 1,
  };
  currentPage = tableMeta.page;
}

// ===================== 工具 =====================
function fmt(n) { return n != null ? n.toLocaleString('zh-CN') : '-'; }
function fmtMoney(n) { if (n == null) return '-'; if (n >= 10000) return (n / 10000).toFixed(1) + '万'; return n.toLocaleString('zh-CN'); }
function shortDate(d) { return d ? d.slice(0,10) : '-'; }
function monthLabel(m) { if (!m) return ''; return m.replace('-0','-').replace('-','/'); }
function addDays(s, n) { const d = new Date(s); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); }
function daysBetween(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function daysToNow(s) { return Math.round((new Date(s) - new Date(TODAY)) / 86400000); }
function splitInterest(totalInterest, amount, partnerAmount) {
  const total = totalInterest || 0;
  const totalAmount = amount || 0;
  const partner = partnerAmount || 0;
  if (!totalAmount || !partner || !total) return { mine: total, partner: 0 };
  const partnerInterest = Math.round(total * partner / totalAmount);
  return { mine: total - partnerInterest, partner: partnerInterest };
}
function isMobile() { return window.innerWidth <= 768; }
function updateHeaderUser() { document.getElementById('updateTime').textContent = currentUsername ? ('当前账号：' + currentUsername + (isAdmin ? ' · 管理员' : '')) : '请先登录'; }
function closeMoreMenu() {
  const menu = document.getElementById('headerMoreMenu');
  if (menu) menu.classList.remove('show');
}
function toggleMoreMenu(event) {
  if (event) event.stopPropagation();
  const menu = document.getElementById('headerMoreMenu');
  if (menu) menu.classList.toggle('show');
}
function handleMoreAction(action) {
  closeMoreMenu();
  if (action === 'admin') showTab('admin');
  else if (action === 'excel') exportExcel();
  else if (action === 'json') exportData();
}
function updateAdminVisibility() {
  const tab = document.getElementById('adminTab');
  const entry = document.getElementById('adminEntryBtn');

  tab.style.display = visible ? '' : 'none';
  entry.style.display = visible ? '' : 'none';

}

function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div'); el.className = 'toast ' + type; el.textContent = msg;
  c.appendChild(el); setTimeout(() => el.remove(), 2600);
}

function calcInvest() {
  const amount = parseFloat(document.getElementById('fAmount').value) || 0;
  const rate = parseFloat(document.getElementById('fRate').value) || 0;
  const days = parseInt(document.getElementById('fDays').value) || 0;
  const date = document.getElementById('fDate').value;
  const interest = Math.round(amount / 10000 * rate);
  document.getElementById('calcInterest').textContent = '¥' + fmt(interest);
  document.getElementById('calcReturnDate').textContent = (date && days > 0) ? addDays(date, days) : '-';
}

async function saveInvest() {
  const editId = document.getElementById('editId').value;
  const date = document.getElementById('fDate').value;
  const amount = parseFloat(document.getElementById('fAmount').value);
  const rate = parseFloat(document.getElementById('fRate').value);
  const days = parseInt(document.getElementById('fDays').value);
  const partnerName = document.getElementById('fPartnerName').value.trim();
  const partnerAmount = parseInt(document.getElementById('fPartnerAmount').value) || 0;
  const remark = document.getElementById('fRemark').value.trim();
  if (!date || !amount || !rate || !days) { toast('请填写完整信息', 'error'); return; }
  if (partnerAmount < 0 || partnerAmount > amount) { toast('合作出资不能大于投资金额', 'error'); return; }
  const interest = Math.round(amount / 10000 * rate);
  const returnDate = addDays(date, days);

  if (editId) {
    const r = records.find(x => x.id === parseInt(editId));
    await api('/api/records/' + editId, 'PUT', { ...r, date, amount, rate, days, interest, returnDate, partnerName, partnerAmount, remark });
    toast('投资记录已更新');
  } else {
    await api('/api/records', 'POST', { date, amount, rate, days, interest, returnDate, partnerName, partnerAmount, remark });
    toast('新增投资成功');
  }
  closeModal('investModal');
  await loadRecords();
}

// ===================== 图表 =====================
function renderChart() {
  const data = Array.isArray(dashboard.monthlyInterest) ? dashboard.monthlyInterest : [];
  if (!data.length) {
    document.getElementById('barChart').innerHTML = '<div class="empty-state">暂无回款数据</div>';
    document.getElementById('hChart').innerHTML = '<div class="empty-state">暂无回款数据</div>';
    return;
  }
  const maxVal = Math.max(...data.map(m => Math.max(m.value || 0, m.myValue || 0)), 1);

  document.getElementById('barChart').innerHTML = data.map(m => {
    const totalHeight = Math.max(4, (m.value / maxVal) * 240);
    const myHeight = Math.max(4, ((m.myValue || 0) / maxVal) * 240);
    return `<div class="bar-group" style="gap:4px">
      <div class="bar-value" style="font-size:10px">${m.value >= 10000 ? (m.value / 10000).toFixed(1) + '万' : fmt(m.value)}</div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:240px">
        <div class="bar" style="height:${totalHeight}px;width:16px;background:linear-gradient(180deg,var(--accent),#a29bfe);border-radius:4px 4px 1px 1px" title="${monthLabel(m.month)} 总利息: ¥${(m.value || 0).toLocaleString()}"></div>
        <div class="bar" style="height:${myHeight}px;width:16px;background:linear-gradient(180deg,var(--green),#00b894);border-radius:4px 4px 1px 1px" title="${monthLabel(m.month)} 我的利息: ¥${(m.myValue || 0).toLocaleString()}"></div>
      </div>
      <div class="bar-label">${monthLabel(m.month)}</div>
    </div>`;
  }).join('');

  document.getElementById('hChart').innerHTML = data.map(m => {
    const totalWidth = Math.max(6, ((m.value || 0) / maxVal) * 100);
    const myWidth = Math.max(6, ((m.myValue || 0) / maxVal) * 100);
    const totalVal = (m.value || 0) >= 10000 ? (m.value / 10000).toFixed(1) + '万' : '¥' + (m.value || 0).toLocaleString();
    const myVal = (m.myValue || 0) >= 10000 ? (m.myValue / 10000).toFixed(1) + '万' : '¥' + (m.myValue || 0).toLocaleString();
    return `<div class="h-row">
      <div class="h-label">${monthLabel(m.month)}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:4px">
        <div class="h-track" style="height:20px"><div class="h-fill" style="width:${totalWidth}%;background:linear-gradient(90deg,var(--accent),#a29bfe)"><span class="h-fill-text">总 ${totalVal}</span></div></div>
        <div class="h-track" style="height:20px"><div class="h-fill" style="width:${myWidth}%;background:linear-gradient(90deg,var(--green),#00b894)"><span class="h-fill-text">我 ${myVal}</span></div></div>
      </div>
    </div>`;
  }).join('');
}

// ===================== 投资周期趋势图 =====================
function renderDaysChart() {

    document.getElementById('daysHChart').innerHTML = '<div class="empty-state">暂无已回款数据</div>';
    return;
  }
  const maxVal = Math.max(...data.map(m => Math.max(m.planAvg, m.actualAvg)), 1);

  document.getElementById('daysBarChart').innerHTML = data.map(m => {
    const hPlan = Math.max(4, (m.planAvg / maxVal) * 240);
    const hActual = Math.max(4, (m.actualAvg / maxVal) * 240);
    return `<div class="bar-group" style="gap:4px">
      <div class="bar-value" style="font-size:10px">${m.actualAvg}天</div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:240px">
        <div class="bar" style="height:${hPlan}px;width:16px;background:linear-gradient(180deg,var(--accent),#a29bfe);border-radius:4px 4px 1px 1px" title="${monthLabel(m.month)} 计划: ${m.planAvg}天"></div>
        <div class="bar" style="height:${hActual}px;width:16px;background:linear-gradient(180deg,var(--orange),#e17055);border-radius:4px 4px 1px 1px" title="${monthLabel(m.month)} 实际: ${m.actualAvg}天"></div>
      </div>
      <div class="bar-label">${monthLabel(m.month)}</div>
    </div>`;

  document.getElementById('daysHChart').innerHTML = data.map(m => {
    const wPlan = Math.max(6, (m.planAvg / maxVal) * 100);
    const wActual = Math.max(6, (m.actualAvg / maxVal) * 100);
    return `<div class="h-row">
      <div class="h-label">${monthLabel(m.month)}</div>
      <div style="flex:1;display:flex;flex-direction:column;gap:4px">
        <div class="h-track" style="height:20px"><div class="h-fill" style="width:${wActual}%;background:linear-gradient(90deg,var(--orange),#e17055)"><span class="h-fill-text">实际 ${m.actualAvg}天</span></div></div>
        <div class="h-track" style="height:20px"><div class="h-fill" style="width:${wPlan}%;background:linear-gradient(90deg,var(--accent),#a29bfe)"><span class="h-fill-text">计划 ${m.planAvg}天</span></div></div>
      </div>
    </div>`;
  }).join('');
}

// ===================== 利率趋势图 =====================
function renderRateChart() {
  const data = Array.isArray(dashboard.rateTrend) ? dashboard.rateTrend : [];
  if (!data.length) {
    document.getElementById('rateBarChart').innerHTML = '<div class="empty-state">暂无数据</div>';
    document.getElementById('rateHChart').innerHTML = '<div class="empty-state">暂无数据</div>';
    return;
  }
  const maxVal = Math.max(...data.map(m => m.avgRate), 1);
  const lastMonth = data[data.length - 1].month;

  document.getElementById('rateBarChart').innerHTML = data.map(m => {
    const h = Math.max(4, (m.avgRate / maxVal) * 240);
    const color = m.month === lastMonth ? 'background: linear-gradient(180deg, var(--orange), #e17055)' : 'background: linear-gradient(180deg, var(--green), #00b894)';
    return `<div class="bar-group"><div class="bar-value">${m.avgRate}</div><div class="bar" style="height:${h}px; ${color}"><div class="bar-tooltip">${monthLabel(m.month)}: ${m.avgRate}/万</div></div><div class="bar-label">${monthLabel(m.month)}</div></div>`;
  }).join('');

  document.getElementById('rateHChart').innerHTML = data.map(m => {
    const w = Math.max(6, (m.avgRate / maxVal) * 100);
    const bg = m.month === lastMonth ? 'background:linear-gradient(90deg,var(--orange),#e17055)' : 'background:linear-gradient(90deg,var(--green),#00b894)';
    return `<div class="h-row"><div class="h-label">${monthLabel(m.month)}</div><div class="h-track"><div class="h-fill" style="width:${w}%;${bg}"><span class="h-fill-text">${m.avgRate}/万</span></div></div></div>`;
  }).join('');
}

// ===================== 表格 =====================
let currentFilter = 'all', currentSearch = '', currentSort = { key: 'date', dir: 'desc' }, currentPage = 1;
const pageSize = 15;

function renderRecord(r) {
  const actualDays = r.actualDate ? daysBetween(r.date, r.actualDate) : null;
  const myPlannedInterest = splitInterest(r.interest, r.amount, r.partnerAmount || 0).mine;
  const myFinalInterest = r.finalInterest != null ? splitInterest(r.finalInterest, r.amount, r.partnerAmount || 0).mine : null;
  let statusTag, daysBadge = '-';
  if (r.returned) { statusTag = '<span class="tag returned">已回款</span>'; }
  else { const d = daysToNow(r.returnDate); const cls = d < 0 ? 'overdue' : d <= 7 ? 'near' : 'far'; const txt = d < 0 ? `${Math.abs(d)}天逾期` : d === 0 ? '今日到期' : `${d}天后`; statusTag = `<span class="tag ${cls}">${cls === 'overdue' ? '逾期' : '待回款'}</span>`; daysBadge = `<span class="days-badge ${cls}">${txt}</span>`; }
  const actionHtml = r.returned
    ? `<button class="btn btn-outline btn-sm" onclick="openReturnModal(${r.id})">改回款</button><button class="btn-icon" onclick="openEditModal(${r.id})">✎</button><button class="btn-icon danger" onclick="openDeleteModal(${r.id})">✕</button>`
    : `<button class="btn btn-green btn-sm" onclick="openReturnModal(${r.id})">回款</button><button class="btn-icon" onclick="openEditModal(${r.id})">✎</button><button class="btn-icon danger" onclick="openDeleteModal(${r.id})">✕</button>`;
  return { actualDays, myPlannedInterest, myFinalInterest, statusTag, daysBadge, actionHtml };
}

function renderTable() {
  const pageData = tableRecords;
  const totalPages = tableMeta.totalPages || 1;
  document.getElementById('totalCount').textContent = tableMeta.total || 0;

  const tbody = document.getElementById('tableBody');
  if (!pageData.length) { tbody.innerHTML = '<tr><td colspan="16"><div class="empty-state">没有匹配的记录</div></td></tr>'; }
  else { tbody.innerHTML = pageData.map(r => { const { actualDays, myPlannedInterest, myFinalInterest, statusTag, daysBadge, actionHtml } = renderRecord(r); const remarkText = [r.partnerName ? `${r.partnerName} ¥${fmt(r.partnerAmount || 0)}` : '', r.remark || ''].filter(Boolean).join(' | '); return `<tr><td>${shortDate(r.date)}</td><td class="amount">¥${fmt(r.amount)}</td><td>${r.rate}</td><td>${r.days||'-'}</td><td class="actual-days">${actualDays != null ? actualDays+'天' : '-'}</td><td>${shortDate(r.returnDate)}</td><td>${r.actualDate ? shortDate(r.actualDate) : '-'}</td><td class="amount">¥${fmt(r.interest)}</td><td class="amount">¥${fmt(myPlannedInterest)}</td><td>${statusTag}</td><td>${daysBadge}</td><td class="amount">${r.finalInterest != null ? '¥'+fmt(r.finalInterest) : '-'}</td><td class="amount">${myFinalInterest != null ? '¥'+fmt(myFinalInterest) : '-'}</td><td>${r.toLaoTan ? '¥'+r.toLaoTan : '-'}</td><td class="remark" title="${remarkText||''}">${remarkText||'-'}</td><td><div class="action-cell">${actionHtml}</div></td></tr>`; }).join(''); }

  const cards = document.getElementById('mobileCards');
  if (!pageData.length) { cards.innerHTML = '<div class="empty-state">没有匹配的记录</div>'; }
  else { cards.innerHTML = pageData.map(r => { const { actualDays, myPlannedInterest, myFinalInterest, statusTag, daysBadge, actionHtml } = renderRecord(r); const d = r.returned ? 0 : daysToNow(r.returnDate); const cls = r.returned ? 'highlight' : (d < 0 ? 'danger' : d <= 7 ? 'warn' : ''); const partnerText = r.partnerName ? `${r.partnerName} ¥${fmt(r.partnerAmount || 0)}` : ''; const bottomText = [r.toLaoTan ? '服务费¥' + r.toLaoTan : '', partnerText, r.remark || ''].filter(Boolean).join(' | '); return `<div class="m-card"><div class="m-card-top"><div><span class="m-card-date">${shortDate(r.date)}</span> ${statusTag}</div><div class="m-card-amount">¥${fmt(r.amount)}</div></div><div class="m-card-grid"><div><div class="m-label">利息/万</div><div class="m-val">${r.rate}</div></div><div><div class="m-label">计划天数</div><div class="m-val">${r.days||'-'}</div></div><div><div class="m-label">实际天数</div><div class="m-val" style="color:var(--blue)">${actualDays != null ? actualDays+'天' : '-'}</div></div><div><div class="m-label">计划总利息</div><div class="m-val">¥${fmt(r.interest)}</div></div><div><div class="m-label">我的计划利息</div><div class="m-val">¥${fmt(myPlannedInterest)}</div></div><div><div class="m-label">计划回款</div><div class="m-val">${shortDate(r.returnDate)}</div></div><div><div class="m-label">实际回款</div><div class="m-val">${r.actualDate ? shortDate(r.actualDate) : '-'}</div></div><div><div class="m-label">实际总利息</div><div class="m-val ${cls}">${r.finalInterest != null ? '¥'+fmt(r.finalInterest) : '-'}</div></div><div><div class="m-label">我的实际利息</div><div class="m-val ${cls}">${myFinalInterest != null ? '¥'+fmt(myFinalInterest) : '-'}</div></div><div><div class="m-label">距回款</div><div class="m-val">${daysBadge}</div></div></div><div class="m-card-bottom"><div class="m-card-remark">${bottomText}</div><div class="m-card-actions">${actionHtml}</div></div></div>`; }).join(''); }

  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) { if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - currentPage) > 1) { if (i === 3 || i === totalPages - 2) html += '<span style="color:var(--text-dim);padding:0 4px">...</span>'; continue; } html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`; }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pag.innerHTML = html;
}

function goPage(p) {
  const totalPages = tableMeta.totalPages || 1;
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  loadTableData().then(() => {
    renderTable();
    if (isMobile()) document.getElementById('tableSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

// ===================== Tab 切换 =====================
const allViews = ['chartSection','daysSection','rateSection','yearSection','partnerSection','adminSection','tableSection'];
const viewMap = { chart:'chartSection', days:'daysSection', rate:'rateSection', year:'yearSection', partner:'partnerSection', admin:'adminSection', table:'tableSection' };

function showTab(view) {
  document.querySelectorAll('.tab').forEach(t => { t.classList.toggle('active', t.dataset.view === view); });
  allViews.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
  const target = document.getElementById(viewMap[view]);
  if (target) target.style.display = '';
}

function refreshAll() {
  updateHeaderUser();
  updateAdminVisibility();
  renderAlerts(); renderStats(); renderChart(); renderDaysChart(); renderRateChart(); renderYearly(); renderPartnerStats(); renderAdmin(); renderTable();
}

// ===================== 事件 =====================
document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => showTab(tab.dataset.view)); });
document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', async () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; currentPage = 1; await loadTableData(); renderTable(); }); });
let searchTimer = null;
document.getElementById('searchBox').addEventListener('input', e => { currentSearch = e.target.value; currentPage = 1; clearTimeout(searchTimer); searchTimer = setTimeout(async () => { await loadTableData(); renderTable(); }, 180); });
document.querySelectorAll('thead th[data-sort]').forEach(th => { th.addEventListener('click', async () => { const key = th.dataset.sort; currentSort = currentSort.key === key ? { key, dir: currentSort.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'desc' }; document.querySelectorAll('thead th .sort-icon').forEach(s => s.textContent = '↕'); th.querySelector('.sort-icon').textContent = currentSort.dir === 'asc' ? '↑' : '↓'; currentPage = 1; await loadTableData(); renderTable(); }); });

// ===================== 初始化 =====================
switchAuthMode('login');
checkAuth();
</script>
